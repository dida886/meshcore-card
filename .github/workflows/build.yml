name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/meshcore-card.js
          # Tags containing a hyphen (e.g. v1.0.0-beta) are treated as
          # prereleases per semver convention. Stable tags (v1.0.0) keep
          # the action's default `make_latest: legacy`, which lets GitHub
          # promote them to Latest by date+semver.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Deliberately not setting `name` or `body`: when the release
          # was pre-created with `gh release create --title --notes ...`
          # those values are preserved instead of being overwritten with
          # generic auto-text.
